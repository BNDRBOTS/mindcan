<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <!-- width=device-width added: fixes layout calc bugs on Android Chrome -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bleeding Edge Blade | Spatial Canvas (SaaS Pro Edition)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/marked/marked.min.js"></script>

    <style>
        :root {
            --bone: #EFECE7;
            --obsidian: #161311;
            --terracotta: #D95A40; 
            --aubergine: #823055;  
            --gold: #D49A36;       
            --void: #595450;       

            --bg-canvas: var(--bone);
            --bg-glass: rgba(239, 236, 231, 0.75);
            
            --card-bg-top: rgba(255, 255, 255, 0.95);
            --card-bg-bottom: rgba(245, 242, 238, 0.85);
            
            --text-primary: var(--obsidian);
            --text-secondary: rgba(22, 19, 17, 0.65);
            --text-inverse: #FFFFFF;
            
            --border-subtle: rgba(22, 19, 17, 0.08);
            --card-bevel-light: rgba(255, 255, 255, 1);
            --card-bevel-shadow: rgba(0, 0, 0, 0.04);
            
            --shadow-float: 0 12px 32px rgba(40, 30, 25, 0.08), 0 4px 12px rgba(40, 30, 25, 0.04);
            --shadow-dock: 0 16px 40px rgba(40, 30, 25, 0.12);
            
            --ring-obsidian-glow: 0 16px 40px rgba(22, 19, 17, 0.15), 0 0 0 4px rgba(22, 19, 17, 0.1);
            --ring-obsidian-border: rgba(22, 19, 17, 0.4);
            --ring-void-glow: 0 16px 40px rgba(89, 84, 80, 0.25), 0 0 0 4px rgba(89, 84, 80, 0.2);
            --ring-void-border: rgba(89, 84, 80, 0.6);
            --ring-terracotta-glow: 0 16px 40px rgba(217, 90, 64, 0.25), 0 0 0 4px rgba(217, 90, 64, 0.2);
            --ring-terracotta-border: rgba(217, 90, 64, 0.6);
            --ring-aubergine-glow: 0 16px 40px rgba(130, 48, 85, 0.25), 0 0 0 4px rgba(130, 48, 85, 0.2);
            --ring-aubergine-border: rgba(130, 48, 85, 0.6);
            --ring-gold-glow: 0 16px 40px rgba(212, 154, 54, 0.25), 0 0 0 4px rgba(212, 154, 54, 0.2);
            --ring-gold-border: rgba(212, 154, 54, 0.6);
            --ring-bone-glow: 0 16px 40px rgba(255, 255, 255, 0.5), 0 0 0 4px rgba(255, 255, 255, 0.6);
            --ring-bone-border: rgba(255, 255, 255, 0.8);

            --active-glow: var(--ring-obsidian-glow);
            --active-border: var(--ring-obsidian-border);
            --active-color: var(--obsidian);
            
            --card-font-size: 13.5px; 
            
            --space-1: 0.5rem;   
            --space-2: 1rem;     
            --space-3: 1.5rem;   

            --font-ui: 'Figtree', sans-serif;
            --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.15);
            --ease-smooth: cubic-bezier(0.25, 0.1, 0.25, 1);
            --grid-size: 32px;
        }

        html[data-theme="dark"] {
            --bg-canvas: #0D0B0A;
            --bg-glass: rgba(13, 11, 10, 0.85);
            --card-bg-top: rgba(30, 26, 24, 0.95);
            --card-bg-bottom: rgba(20, 17, 15, 0.85);
            --text-primary: var(--bone);
            --text-secondary: rgba(239, 236, 231, 0.65);
            --text-inverse: var(--obsidian);
            --border-subtle: rgba(239, 236, 231, 0.12);
            --card-bevel-light: rgba(255, 255, 255, 0.1);
            --card-bevel-shadow: rgba(0, 0, 0, 0.8);
            --shadow-float: 0 16px 40px rgba(0, 0, 0, 0.8), 0 4px 12px rgba(0, 0, 0, 0.6);
            --shadow-dock: 0 20px 50px rgba(0, 0, 0, 0.95);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            background-color: var(--bg-canvas);
            color: var(--text-primary);
            font-family: var(--font-ui);
            overflow: hidden;
            width: 100dvw;
            height: 100dvh;
            overscroll-behavior: none;
            transition: background-color 0.4s ease;
        }

        .ui-btn, .handle, .color-picker, #ui-dock, .toast, #connections-svg, #modal-layer, #synthesis-panel .sp-header {
            user-select: none;
            -webkit-user-select: none;
        }

        .card-content {
            user-select: text;
            -webkit-user-select: text;
            cursor: text;
        }

        body.is-panning, body.is-dragging, body.is-resizing {
            user-select: none;
            -webkit-user-select: none;
        }

        /* ===================== TOAST ===================== */
        #toast-container {
            position: fixed;
            top: 24px; left: 50%;
            transform: translateX(-50%);
            z-index: 30000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: linear-gradient(180deg, var(--card-bg-top), var(--card-bg-bottom));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 12px;
            box-shadow: 
                inset 0 1px 1px var(--card-bevel-light),
                inset 0 -1px 2px var(--card-bevel-shadow),
                var(--shadow-float);
            font-weight: 600;
            font-size: 13px;
            border: 1px solid var(--border-subtle);
            animation: toastIn 0.4s var(--ease-spring);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @keyframes toastIn {
            0% { opacity: 0; transform: translateY(-20px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ===================== MODAL ===================== */
        #modal-layer {
            position: fixed; top: 0; left: 0; width: 100dvw; height: 100dvh;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            z-index: 20000; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #modal-layer.is-active { opacity: 1; pointer-events: auto; }
        .modal-box {
            background: linear-gradient(180deg, var(--card-bg-top), var(--card-bg-bottom));
            border: 1px solid var(--border-subtle); border-radius: 24px; padding: 24px;
            width: 90%; max-width: 440px; box-shadow: var(--shadow-dock);
            display: flex; flex-direction: column; gap: 16px; transform: translateY(20px); transition: transform 0.3s;
        }
        #modal-layer.is-active .modal-box { transform: translateY(0); }
        .modal-title { font-size: 18px; font-weight: 800; color: var(--text-primary); }
        .modal-body { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; flex-wrap: wrap; }

        /* ===================== SYNTHESIS PANEL ===================== */
        #synthesis-panel {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(180deg, var(--card-bg-top), var(--card-bg-bottom));
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-subtle);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px 24px 0 0;
            z-index: 12000;
            transform: translateY(100%);
            transition: transform 0.45s var(--ease-spring);
            max-height: 75vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -8px 40px rgba(40, 30, 25, 0.12);
        }
        html[data-theme="dark"] #synthesis-panel {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.6);
        }
        #synthesis-panel.is-open { transform: translateY(0); }

        .sp-drag-bar {
            width: 40px; height: 4px;
            background: var(--border-subtle);
            border-radius: 2px;
            margin: 14px auto 0;
            flex-shrink: 0;
        }

        .sp-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px 12px;
            border-bottom: 1px solid var(--border-subtle);
            flex-shrink: 0;
            gap: 8px;
            flex-wrap: wrap;
            min-width: 0;
        }

        .sp-title {
            font-size: 15px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            flex-shrink: 0;
        }

        .sp-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            flex-shrink: 0;
            align-items: center;
        }

        /* On very narrow screens, collapse sp-actions button text to icons only */
        @media (max-width: 400px) {
            .sp-header { padding: 12px 14px 10px; gap: 6px; }
            .sp-actions { gap: 4px; }
            #sp-export-pdf span:not(.icon), #sp-add-canvas span:not(.icon) { display: none; }
        }

        .sp-content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 24px 28px;
            padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 32px);
            line-height: 1.75;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .sp-content h1 {
            font-size: 21px; font-weight: 800;
            color: var(--text-primary);
            margin: 0 0 12px;
            line-height: 1.2;
        }
        .sp-content h2 {
            font-size: 17px; font-weight: 700;
            color: var(--text-primary);
            margin: 28px 0 8px;
            line-height: 1.3;
        }
        .sp-content h3 {
            font-size: 14px; font-weight: 700;
            color: var(--text-secondary);
            margin: 20px 0 6px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .sp-content h4 {
            font-size: 14px; font-weight: 700;
            color: var(--text-primary);
            margin: 16px 0 5px;
        }
        .sp-content p { margin: 10px 0; }
        .sp-content ul, .sp-content ol { padding-left: 22px; margin: 10px 0; }
        .sp-content li { margin: 5px 0; }
        .sp-content ol { list-style-type: decimal; }
        .sp-content ul { list-style-type: disc; }
        .sp-content strong { color: var(--text-primary); font-weight: 700; }
        .sp-content em { font-style: italic; }
        .sp-content code {
            background: var(--border-subtle);
            border-radius: 4px;
            padding: 2px 6px;
            font-family: monospace;
            font-size: 12px;
        }
        .sp-content blockquote {
            border-left: 3px solid var(--terracotta);
            margin: 12px 0;
            padding: 8px 16px;
            color: var(--text-secondary);
            font-style: italic;
        }
        .sp-content hr {
            border: none;
            border-top: 1px solid var(--border-subtle);
            margin: 20px 0;
        }
        .sp-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 13px;
        }
        .sp-content th {
            font-weight: 700;
            color: var(--text-primary);
            text-align: left;
            padding: 7px 10px;
            border: 1px solid var(--border-subtle);
            background: rgba(128,128,128,0.05);
        }
        .sp-content td {
            padding: 6px 10px;
            border: 1px solid var(--border-subtle);
            vertical-align: top;
        }

        /* ===================== DOCK ===================== */
        #ui-dock {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-subtle);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 14px; 
            padding: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: 
                inset 0 -2px 6px rgba(0,0,0,0.02),
                var(--shadow-dock);
            z-index: 10000;
            pointer-events: auto;
            /* Scroll horizontally on narrow screens — never clip buttons */
            max-width: calc(100dvw - 24px);
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; /* Firefox */
            transition: bottom 0.3s ease;
        }
        /* Chrome/Safari — hide scrollbar visually but keep scroll behaviour */
        #ui-dock::-webkit-scrollbar { display: none; }

        html[data-theme="dark"] #ui-dock { border-top: 1px solid rgba(255, 255, 255, 0.08); }
        #ui-dock.is-dragging { box-shadow: 0 24px 50px rgba(0,0,0,0.2); }

        /* Vertical mode — manual rotate or auto below 420px */
        #ui-dock.is-vertical {
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
            max-height: calc(100dvh - 32px);
            max-width: max-content;
            bottom: auto;
        }
        #ui-dock.is-vertical .dock-divider { width: 20px; height: 1px; margin: 2px 0; }
        #ui-dock.is-vertical .dock-drag-handle svg { transform: rotate(90deg); }

        /* ---- DOCK COMPRESSION TIERS ---- */

        /* Tier 1 — ≤760px: shrink buttons, tighten gaps */
        @media (max-width: 760px) {
            #ui-dock { gap: 3px; padding: 5px; }
            .ui-btn { height: 32px; padding: 0 10px; font-size: 12px; gap: 4px; }
            .ui-btn.icon-only { padding: 0 8px; }
            .font-stepper { height: 32px; }
            .font-stepper .ui-btn { height: 28px; padding: 0 8px; }
            .dock-drag-handle { width: 28px; height: 32px; }
            .dock-divider { height: 16px; margin: 0 2px; }
        }

        /* Tier 2 — ≤600px: hide text on utility buttons, keep primary labels */
        @media (max-width: 600px) {
            #btn-free span:not(.icon), #btn-grid span:not(.icon),
            #btn-theme span:not(.icon), #btn-save span:not(.icon),
            #btn-export span:not(.icon), #btn-undo span:not(.icon),
            #btn-reset span:not(.icon), #btn-legend span:not(.icon) { display: none; }
            .ui-btn { padding: 0 9px; }
            #ui-dock { gap: 2px; }
        }

        /* Tier 3 — ≤460px: hide ALL text labels, icon-only mode */
        @media (max-width: 460px) {
            #btn-add span:not(.icon), #btn-syn span:not(.icon) { display: none; }
            .ui-btn { height: 30px; padding: 0 8px; font-size: 11px; }
            .font-stepper { height: 30px; }
            .font-stepper .ui-btn { height: 26px; }
            .dock-divider:nth-child(n+8) { display: none; }
        }

        /* Tier 4 — ≤360px: auto-vertical via JS class, CSS fallback */
        @media (max-width: 360px) {
            #ui-dock:not(.is-dragged) {
                flex-direction: column;
                overflow-x: hidden;
                overflow-y: auto;
                max-width: max-content;
                max-height: calc(100dvh - 80px);
                left: 12px;
                transform: none;
                bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
            }
            #ui-dock:not(.is-dragged) .dock-divider { width: 20px; height: 1px; margin: 2px 0; }
        }

        .dock-drag-handle {
            width: 32px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            color: var(--text-secondary);
            flex-shrink: 0;
            border-radius: 8px;
            transition: background 0.2s, color 0.2s;
            touch-action: none;
        }
        .dock-drag-handle:hover { background: rgba(128, 128, 128, 0.1); color: var(--text-primary); }
        .dock-drag-handle:active { cursor: grabbing; }

        .dock-divider {
            width: 1px;
            height: 20px;
            background: var(--border-subtle);
            margin: 0 2px;
            flex-shrink: 0;
        }

        .ui-btn {
            height: 36px;
            padding: 0 14px;
            border-radius: 8px;
            font-family: var(--font-ui);
            font-size: 13px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
            border: none;
            cursor: pointer;
            transition: all 0.2s var(--ease-spring);
            background: transparent;
            color: var(--text-secondary);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .ui-btn .icon { font-size: 14px; font-weight: 800; }
        .ui-btn:hover { background: rgba(128, 128, 128, 0.1); color: var(--text-primary); }
        .ui-btn.active {
            background: var(--text-primary);
            color: var(--bg-canvas);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .ui-btn.icon-only { padding: 0 10px; }

        .font-stepper {
            display: flex;
            align-items: center;
            background: rgba(128,128,128,0.06);
            border-radius: 8px;
            padding: 2px;
            height: 36px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.04);
            flex-shrink: 0;
        }
        .font-stepper .ui-btn { background: transparent; height: 32px; padding: 0 10px; box-shadow: none; }
        .font-stepper .ui-btn:hover { background: var(--bg-canvas); color: var(--text-primary); box-shadow: 0 2px 6px rgba(0,0,0,0.1); }

        .btn-terracotta {
            background: linear-gradient(180deg, #E26E54, var(--terracotta));
            color: #FFFFFF;
            border: 1px solid rgba(0, 0, 0, 0.1); 
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 12px rgba(217, 90, 64, 0.25);
            text-shadow: 0 1px 2px rgba(0,0,0,0.15);
        }
        .btn-terracotta:hover {
            background: linear-gradient(180deg, #E57D65, #E26E54);
            color: #FFFFFF;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(217, 90, 64, 0.35);
        }
        .btn-terracotta:active {
            transform: translateY(1px);
            background: var(--terracotta);
            border-top: 1px solid transparent;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .btn-aubergine {
            background: linear-gradient(180deg, rgba(148, 62, 102, 0.8), rgba(130, 48, 85, 0.85));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            color: #FFFFFF;
            box-shadow: 0 4px 15px rgba(130, 48, 85, 0.2);
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .btn-aubergine:hover {
            background: linear-gradient(180deg, rgba(160, 75, 115, 0.9), rgba(148, 62, 102, 0.95));
            color: #FFFFFF;
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(130, 48, 85, 0.3);
        }
        .btn-aubergine:active {
            transform: translateY(1px);
            background: rgba(130, 48, 85, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        /* ===================== CANVAS ===================== */
        #viewport {
            width: 100dvw;
            height: 100dvh;
            cursor: grab;
            position: relative;
            touch-action: none;
        }

        #viewport:active { cursor: grabbing; }

        #grid-pattern {
            position: fixed;
            top: 0; left: 0; width: 100dvw; height: 100dvh;
            pointer-events: none;
            background-image: radial-gradient(var(--border-subtle) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            background-position: 0 0;
            z-index: 0;
        }

        #connections-svg {
            position: fixed;
            top: 0; left: 0;
            width: 100dvw; height: 100dvh;
            pointer-events: none;
            z-index: 1; 
            overflow: visible;
        }

        #connections {
            transform-origin: 0 0;
            will-change: transform;
            transition: transform 0.4s var(--ease-spring);
        }
        #connections.no-transition { transition: none; }

        #world {
            position: fixed;
            top: 0; left: 0;
            width: 0; height: 0;
            transform-origin: 0 0;
            will-change: transform;
            z-index: 2;
            transition: transform 0.4s var(--ease-spring);
        }
        #world.no-transition { transition: none; }
        
        .conn-line {
            stroke: var(--text-secondary);
            stroke-width: 3px;
            stroke-linecap: round;
            fill: none;
            transition: stroke 0.3s var(--ease-smooth);
            pointer-events: none;
        }
        .conn-line.temp {
            stroke: var(--aubergine);
            stroke-dasharray: 6 6;
            animation: dashMove 1s linear infinite;
        }

        .conn-hit {
            stroke: transparent;
            stroke-width: 44px;
            fill: none;
            pointer-events: stroke;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .conn-line.is-hovered, .conn-line.is-active {
            stroke: var(--terracotta) !important;
            stroke-width: 4px;
            filter: drop-shadow(0 0 6px var(--terracotta));
        }

        @keyframes dashMove {
            to { stroke-dashoffset: -12; }
        }

        /* ===================== CARDS ===================== */
        #cards {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 3;
        }

        .card {
            position: fixed;
            top: 0; left: 0;
            background: linear-gradient(180deg, var(--card-bg-top), var(--card-bg-bottom));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1.5px solid var(--active-border);
            border-radius: 48px; 
            padding: 24px 36px; 
            min-width: 160px;
            color: var(--text-primary);
            font-size: var(--card-font-size); 
            line-height: 1.5;
            text-align: center; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 
                inset 0 1.5px 2px var(--card-bevel-light),
                inset 0 -2px 4px var(--card-bevel-shadow),
                var(--shadow-float);
            will-change: transform, width, height;
            transition: opacity 0.4s var(--ease-smooth), box-shadow 0.4s var(--ease-spring), border-color 0.4s;
            cursor: grab;
            touch-action: none;
        }

        body.has-focus .card:not(.is-focused) {
            opacity: 0.4;
            box-shadow: none;
        }

        .card.theme-obsidian { --active-glow: var(--ring-obsidian-glow); --active-border: var(--ring-obsidian-border); --active-color: var(--obsidian); }
        .card.theme-void { --active-glow: var(--ring-void-glow); --active-border: var(--ring-void-border); --active-color: var(--void); }
        .card.theme-terracotta { --active-glow: var(--ring-terracotta-glow); --active-border: var(--ring-terracotta-border); --active-color: var(--terracotta); }
        .card.theme-aubergine { --active-glow: var(--ring-aubergine-glow); --active-border: var(--ring-aubergine-border); --active-color: var(--aubergine); }
        .card.theme-gold { --active-glow: var(--ring-gold-glow); --active-border: var(--ring-gold-border); --active-color: var(--gold); }

        .card.is-focused, .card.is-editing {
            border-color: var(--active-border);
            box-shadow: 
                inset 0 1.5px 2px var(--card-bevel-light),
                inset 0 -2px 4px var(--card-bevel-shadow),
                var(--active-glow);
            z-index: 10;
        }

        .card.is-editing { cursor: default; }

        .card-controls {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s var(--ease-smooth);
            z-index: 20;
        }

        body:not(.is-dragging):not(.is-connecting) .card:hover .card-controls,
        body:not(.is-dragging):not(.is-connecting) .card.is-focused .card-controls,
        body:not(.is-connecting) .card.color-flash .card-controls {
            opacity: 1;
            pointer-events: auto;
        }

        .card.is-editing .card-controls {
            opacity: 0 !important; 
            pointer-events: none !important;
        }

        body.is-connecting .card-controls {
            opacity: 1 !important;
            pointer-events: auto !important; 
        }
        
        body.is-connecting .color-picker,
        body.is-connecting .handle-resize,
        body.is-connecting .handle-delete {
            opacity: 0 !important;
            pointer-events: none !important;
            display: none !important;
        }
        
        body.is-connecting .handle-connect {
            transform: scale(1.2);
            box-shadow: 0 0 0 3px rgba(128, 128, 128, 0.15);
        }

        .color-picker {
            position: fixed;
            top: -46px; left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(180deg, var(--card-bg-top), var(--card-bg-bottom));
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 6px;
            display: flex;
            gap: 6px;
            box-shadow: 0 4px 12px rgba(40, 30, 25, 0.1);
        }

        .color-swatch {
            width: 18px; height: 18px;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s var(--ease-spring);
            border: 1px solid rgba(0,0,0,0.2);
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.2);
            transform: scale(1);
        }
        .color-swatch:hover { transform: scale(1.15); }
        .swatch-obsidian { background: var(--obsidian); }
        .swatch-void { background: var(--void); }
        .swatch-terracotta { background: var(--terracotta); }
        .swatch-aubergine { background: var(--aubergine); }
        .swatch-gold { background: var(--gold); }

        .handle-connect {
            position: fixed;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: var(--text-inverse);
            border: 3px solid var(--active-color);
            box-shadow: 0 2px 6px rgba(40, 30, 25, 0.15);
            cursor: crosshair;
            transition: transform 0.2s var(--ease-spring), background 0.2s, box-shadow 0.2s;
            z-index: 25;
            transform: scale(1);
        }

        .handle-connect:hover {
            transform: scale(1.4) !important;
            background: var(--active-color);
        }

        .hc-top { top: -7px; left: calc(50% - 7px); }
        .hc-right { right: -7px; top: calc(50% - 7px); }
        .hc-bottom { bottom: -7px; left: calc(50% - 7px); }
        .hc-left { left: -7px; top: calc(50% - 7px); }

        .handle-delete {
            position: fixed;
            top: -4px; left: 16px; 
            width: 26px; height: 26px;
            background: linear-gradient(180deg, var(--card-bg-top), var(--card-bg-bottom));
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(40, 30, 25, 0.1);
            transition: all 0.2s var(--ease-spring);
            transform: scale(1);
        }
        .handle-delete::before { content: '×'; }
        .handle-delete:hover {
            color: var(--terracotta);
            transform: scale(1.1);
        }

        .handle-resize {
            position: fixed;
            bottom: 6px; right: 24px; 
            width: 32px; height: 32px; 
            cursor: se-resize;
            opacity: 0.3;
            transition: opacity 0.2s;
            z-index: 5; 
            transform: scale(1);
        }
        .handle-resize::after {
            content: '';
            position: fixed;
            right: 8px; bottom: 8px;
            width: 10px; height: 10px;
            border-right: 2.5px solid var(--text-secondary);
            border-bottom: 2.5px solid var(--text-secondary);
            border-radius: 2px;
        }
        .handle-resize:hover { opacity: 1; }

        .card-content {
            width: 100%; 
            height: 100%;
            outline: none;
            overflow: hidden;
            word-wrap: break-word;
            pointer-events: none;
            font-weight: 600; 
        }
        .card.is-editing .card-content {
            pointer-events: auto;
            overflow-y: auto;
        }

        .card-content strong { font-weight: 800; color: var(--text-primary); }
        .card-content em { font-style: italic; }
        .card-content del { text-decoration: line-through; opacity: 0.7; }
        .card-content u { text-decoration: underline; }

        /* ===================== MOBILE / TOUCH ===================== */
        @media (pointer: coarse) {
            .ui-btn { min-height: 40px; }
            .font-stepper .ui-btn { min-height: 36px; }
            .handle-connect::after {
                content: '';
                position: fixed;
                top: 50%; left: 50%;
                width: 44px; height: 44px;
                transform: translate(-50%, -50%);
                border-radius: 50%;
            }
            .handle-delete::after {
                content: '';
                position: fixed;
                top: 50%; left: 50%;
                width: 44px; height: 44px;
                transform: translate(-50%, -50%);
            }
            .handle-resize::before {
                content: '';
                position: fixed;
                right: -10px; bottom: -10px;
                width: 44px; height: 44px;
            }
            .color-swatch {
                width: 24px;
                height: 24px;
            }
            .color-swatch::after {
                content: '';
                position: fixed;
                top: 50%; left: 50%;
                width: 36px; height: 36px;
                transform: translate(-50%, -50%);
            }
            .dock-drag-handle { width: 40px; height: 40px; }
            .sp-header { padding: 12px 16px 10px; }
            .sp-content {
                padding: 20px;
                padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 40px);
            }
            /* iOS Safari: font-size ≥16px on all inputs prevents viewport auto-zoom on focus */
            input, textarea, select { font-size: 16px !important; }
        }

        /* ===================== LEGEND MODAL ===================== */
        #legend-modal {
            position: fixed; top: 0; left: 0; width: 100dvw; height: 100dvh;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            z-index: 20500; display: flex; align-items: center; justify-content: center;
            /* Safe-area padding so modal never hides behind notch/home-bar */
            padding: max(16px, env(safe-area-inset-top, 16px)) 16px max(16px, env(safe-area-inset-bottom, 16px));
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #legend-modal.is-active { opacity: 1; pointer-events: auto; }
        #legend-modal .modal-box {
            transform: translateY(20px);
            transition: transform 0.3s;
            max-width: 380px;
            /* Scroll on short screens — never overflow viewport */
            max-height: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        #legend-modal.is-active .modal-box { transform: translateY(0); }

        .legend-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .legend-swatch {
            width: 20px; height: 20px;
            border-radius: 5px;
            flex-shrink: 0;
            border: 1px solid rgba(0,0,0,0.15);
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.2);
        }

        .legend-input {
            flex: 1;
            height: 34px;
            border-radius: 8px;
            border: 1px solid var(--border-subtle);
            background: var(--bg-canvas);
            color: var(--text-primary);
            font-family: var(--font-ui);
            font-size: 13px;
            font-weight: 600;
            padding: 0 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        .legend-input:focus { border-color: var(--terracotta); }

        .legend-note {
            font-size: 11px;
            color: var(--text-secondary);
            font-style: italic;
            text-align: center;
            margin-top: -4px;
        }

        @media (pointer: coarse) {
            /* 16px: prevents iOS Safari auto-zoom; height increase for touch comfort */
            .legend-input { height: 44px; font-size: 16px; }
            .legend-swatch { width: 24px; height: 24px; }
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>
    
    <div id="modal-layer">
        <div class="modal-box">
            <div class="modal-title" id="modal-title"></div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-actions" id="modal-actions"></div>
        </div>
    </div>

    <!-- LEGEND MODAL -->
    <div id="legend-modal">
        <div class="modal-box">
            <div class="modal-title">◈ Color Legend</div>
            <div class="modal-body" style="margin-bottom:-4px">Name each color. Labels inject into Synthesis prompts.</div>
            <div style="display:flex;flex-direction:column;gap:8px;">
                <div class="legend-row">
                    <div class="legend-swatch" style="background:var(--obsidian)"></div>
                    <input class="legend-input" id="leg-obsidian" type="text" maxlength="40" placeholder="e.g. Core Idea">
                </div>
                <div class="legend-row">
                    <div class="legend-swatch" style="background:var(--void)"></div>
                    <input class="legend-input" id="leg-void" type="text" maxlength="40" placeholder="e.g. Supporting Point">
                </div>
                <div class="legend-row">
                    <div class="legend-swatch" style="background:var(--terracotta)"></div>

                </div>
                <div class="legend-row">

    <!-- SYNTHESIS PANEL -->

                <button class="ui-btn btn-aubergine" id="sp-add-canvas"><span class="icon">+</span> Add to Canvas</button>

    <div id="ui-dock">

                <circle cx="3" cy="2" r="1.5"/>

                <circle cx="9" cy="8" r="1.5"/>
                <circle cx="3" cy="14" r="1.5"/>
                <circle cx="9" cy="14" r="1.5"/>
            </svg>
        </div>
        
        <button class="ui-btn icon-only" id="btn-rotate" title="Rotate UI"><span class="icon">↻</span></button>

        <div class="dock-divider"></div>

        <button class="ui-btn btn-terracotta" id="btn-add"><span class="icon">+</span> New Card</button>
        <button class="ui-btn btn-aubergine" id="btn-syn"><span class="icon">❖</span> Synthesis</button>

        <div class="dock-divider"></div>

        <button class="ui-btn icon-only" id="btn-recenter" title="Recenter Canvas"><span class="icon">⌖</span></button>
        
        <div class="dock-divider"></div>

        <button class="ui-btn active" id="btn-free"><span class="icon">≢</span> Free</button>

        <div class="dock-divider"></div>
        
        <div class="font-stepper">
            <button class="ui-btn fs-small" id="btn-font-down">A-</button>
            <button class="ui-btn fs-large" id="btn-font-up">A+</button>
        </div>
        
        <div class="dock-divider"></div>

        <button class="ui-btn" id="btn-theme"><span class="icon">☾</span> Theme</button>
        
        <div class="dock-divider"></div>

        <button class="ui-btn" id="btn-save" title="Save Canvas Locally"><span class="icon">↓</span> Save</button>
        <button class="ui-btn" id="btn-export" title="Export Canvas"><span class="icon">⎘</span> Export</button>
        <button class="ui-btn" id="btn-undo" title="Undo Last Action"><span class="icon">↶</span> Undo</button>

        <div class="dock-divider"></div>

    <div id="viewport">
        <div id="grid-pattern"></div>
        
        <svg id="connections-svg" xmlns="http://www.w3.org/2000/svg">
            <g id="connections"></g>
        </svg>

        <div id="world">
            <div id="cards"></div>
        </div>
    </div>

    <script>
        const ENV = {
            viewport: document.getElementById('viewport'),
            world: document.getElementById('world'),
            cardsLayer: document.getElementById('cards'),
            connSvg: document.getElementById('connections-svg'),
            connLayer: document.getElementById('connections'), 
            gridPattern: document.getElementById('grid-pattern'),
            modalLayer: document.getElementById('modal-layer'),
            body: document.body
        };

        const CFG = {
            grid: 32,
            minZoom: 0.15,
            maxZoom: 2.5,
            repulsionForce: 12, 
            defaultCamera: { x: 0, y: 0, zoom: 1 } 
        };

        const STATE = {
            mode: 'free', 
            camera: { x: 0, y: 0, zoom: 1 },
            cards: new Map(),
            connections: [],
            undoStack: [],
            preDragState: null,
            preEditState: null,
            focusedCardId: null,
            editingCardId: null,
            isPanning: false,
            panStart: { x: 0, y: 0, camX: 0, camY: 0 },
            draggingCard: null,
            dragStart: { x: 0, y: 0, cardX: 0, cardY: 0 },
            resizingCard: null,
            resizeStart: { x: 0, y: 0, w: 0, h: 0 },
            isConnecting: false,
            connStart: { cardId: null, edge: null },
            tempPathEl: null
        };

        let lastCardId = 0;
        let lastConnId = 0;

        /* ---- SYNTHESIS PANEL STATE ---- */
        let _synthMarkdown = '';
        let _synthCapturedIds = [];

        /* ---- LEGEND STATE ---- */
        let LEGEND = {
            obsidian: '',
            void: '',
            terracotta: '',
            aubergine: '',
            gold: ''
        };

        function loadLegend() {
            const raw = localStorage.getItem('spatial_canvas_legend');
            if (raw) {
                try { Object.assign(LEGEND, JSON.parse(raw)); } catch(e) {}
            }
        }

        function saveLegend() {
            localStorage.setItem('spatial_canvas_legend', JSON.stringify(LEGEND));
        }

        /* ---- MARKDOWN RENDERER ----
         * Tries marked.js first (gfm + breaks). Falls back to a full inline
         * renderer that handles h1-h4, bold, italic, strikethrough, underline,
         * code, blockquote, ordered/unordered lists, hr, and paragraphs.
         */
        function renderMarkdown(text) {
            if (typeof marked !== 'undefined' && marked.parse) {
                try {
                    marked.use({
                        breaks: true,
                        gfm: true,
                        mangle: false,
                        headerIds: false
                    });
                    return marked.parse(text);
                } catch (e) {
                    // Fall through to manual renderer below
                }
            }

            // Full inline fallback — block-level first, then inline
            let html = text;
            html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
            html = html.replace(/^### (.+)$/gm,  '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm,   '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm,    '<h1>$1</h1>');
            html = html.replace(/^(?:---|\*\*\*|___)\s*$/gm, '<hr>');
            html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
            html = html.replace(/(?:(?:^|\n)\d+\. .+)+/g, match => {
                const items = match.trim().replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
                return '<ol>' + items + '</ol>';
            });
            html = html.replace(/(?:(?:^|\n)[-*] .+)+/g, match => {
                const items = match.trim().replace(/^[-*] (.+)$/gm, '<li>$1</li>');
                return '<ul>' + items + '</ul>';
            });
            html = html.replace(/\*\*([^*<>\n]+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/(?<!\*)\*(?!\*)([^*<>\n]+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
            html = html.replace(/~~([^~\n]+?)~~/g, '<del>$1</del>');
            html = html.replace(/__([^_\n]+?)__/g, '<u>$1</u>');
            html = html.replace(/`([^`\n]+?)`/g, '<code>$1</code>');
            html = html.split(/\n{2,}/).map(p => {
                p = p.trim();
                if (!p) return '';
                if (/^<[h1-6houbl]/.test(p)) return p;
                return `<p>${p}</p>`;
            }).join('');
            return html;
        }

        /* ---- SYNTHESIS PANEL ---- */
        function showSynthesisPanel(markdownText, capturedIds) {
            _synthMarkdown = markdownText;
            _synthCapturedIds = capturedIds || Array.from(STATE.cards.keys());
            document.getElementById('sp-content').innerHTML = renderMarkdown(markdownText);
            document.getElementById('synthesis-panel').classList.add('is-open');
        }

        function closeSynthesisPanel() {
            document.getElementById('synthesis-panel').classList.remove('is-open');
        }

        /* Swipe-down-to-dismiss — only fires when content is scrolled to top */
        (function initSynthesisSwipe() {
            const panel = document.getElementById('synthesis-panel');
            let touchStartY = 0;
            let isSwiping = false;

            panel.addEventListener('touchstart', e => {
                touchStartY = e.touches[0].clientY;
                isSwiping = false;
            }, { passive: true });

            panel.addEventListener('touchmove', e => {
                const dy = e.touches[0].clientY - touchStartY;
                const content = document.getElementById('sp-content');
                const atTop = !content || content.scrollTop <= 0;
                if (dy > 10 && atTop) {
                    isSwiping = true;
                    const clamped = Math.min(dy * 0.4, 120);
                    panel.style.transform = `translateY(${clamped}px)`;
                    panel.style.transition = 'none';
                }
            }, { passive: true });

            panel.addEventListener('touchend', e => {
                panel.style.transition = '';
                panel.style.transform = '';
                if (isSwiping) {
                    const dy = e.changedTouches[0].clientY - touchStartY;
                    if (dy > 80) closeSynthesisPanel();
                }
                isSwiping = false;
            }, { passive: true });
        })();

        function addSynthesisToCanvas() {
            const summary = _synthMarkdown;
            const existingIds = _synthCapturedIds;
            const center = screenToWorld(window.innerWidth / 2, window.innerHeight / 2);

            setTimeout(() => {
                pushUndoState();
                const aiCard = createCard(
                    center.x - 140,
                    center.y - 80,
                    280,
                    'auto',
                    `<strong>Synthesis</strong><br><br>${summary.replace(/\n/g, '<br>')}`
                );
                aiCard.el.classList.add('theme-aubergine');
                aiCard.h = aiCard.el.offsetHeight;
                renderCard(aiCard);
                setFocus(aiCard.id);
                resolveOverlap(aiCard);
                existingIds.forEach(id => {
                    createConnection(id, 'right', aiCard.id, 'left');
                });
                showToast("Synthesis Added to Canvas");
            }, 50);

            closeSynthesisPanel();
        }

        function exportSynthesisPDF() {
            const renderedHTML = document.getElementById('sp-content').innerHTML;
            const dateStr = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

        /* ---- UNDO / SAVE / LOAD ---- */
        function pushUndoState(specificState = null) {
            const stateToSave = specificState || serializeCanvas();
            STATE.undoStack.push(stateToSave);
            if (STATE.undoStack.length > 50) STATE.undoStack.shift();
        }

        function execUndo() {
            if (STATE.undoStack.length === 0) {
                showToast("Nothing to undo");
                return;
            }
            const prevStateStr = STATE.undoStack.pop();
            restoreCanvasState(prevStateStr);
            showToast("Undo Successful");
        }

        function restoreCanvasState(raw) {
            try {
                const data = JSON.parse(raw);
                STATE.cards.forEach(c => c.el.remove());
                STATE.connections.forEach(c => { c.pathEl.remove(); if (c.hitEl) c.hitEl.remove(); });
                STATE.cards.clear();
                STATE.connections = [];
                let maxCardId = 0;
                let maxConnId = 0;
                STATE.camera = data.camera || { ...CFG.defaultCamera };
                updateCamera();
                const idMap = new Map();
                data.cards.forEach(cData => {
                    const parsedId = parseInt(cData.id.replace('c_', '')) || 0;
                    if (parsedId > maxCardId) maxCardId = parsedId;
                    const c = createCard(cData.x, cData.y, cData.w, cData.h, cData.text, cData.id);
                    idMap.set(cData.id, c.id);
                    c.el.classList.remove('theme-obsidian', 'theme-void', 'theme-terracotta', 'theme-aubergine', 'theme-gold');
                    if (cData.theme) c.el.classList.add(cData.theme);
                });
                lastCardId = Math.max(lastCardId, maxCardId);
                data.connections.forEach(conn => {
                    const parsedConnId = parseInt(conn.id.replace('c_', '')) || 0;
                    if (parsedConnId > maxConnId) maxConnId = parsedConnId;
                    const newSource = idMap.get(conn.sourceId);
                    const newEnd = idMap.get(conn.endId);
                    if (newSource && newEnd) {
                        createConnection(newSource, conn.sourceEdge, newEnd, conn.endEdge, conn.id);
                    }
                });
                lastConnId = Math.max(lastConnId, maxConnId);
                return true;
            } catch (e) {
                console.error("Restore Failed", e);
                return false;
            }
        }

        function saveCanvas() {
            localStorage.setItem('spatial_canvas_save', serializeCanvas());
            showToast("Canvas Saved Locally");
        }

        function loadCanvas() {
            const raw = localStorage.getItem('spatial_canvas_save');
            if (!raw) return false;
            const success = restoreCanvasState(raw);
            if (success) showToast("Saved Canvas Restored");
            return success;
        }

        function execReset() {
            STATE.cards.forEach(c => c.el.remove());
            STATE.connections.forEach(c => { c.pathEl.remove(); if (c.hitEl) c.hitEl.remove(); });
            STATE.cards.clear();
            STATE.connections = [];
            STATE.camera = { ...CFG.defaultCamera };
            updateCamera();
            localStorage.removeItem('spatial_canvas_save');
            lastCardId = 0;
            lastConnId = 0;
            closeModal();
            showToast("Canvas Cleared");
        }
