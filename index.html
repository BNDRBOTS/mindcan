<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bleeding Edge Blade | Spatial Canvas (SaaS Pro Edition)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           ROOT TOKEN BASE: WARM SAAS PRO PALETTE & 3D DEPTH
           ========================================================================== */
        :root {
            /* --- BASE WARM PALETTE --- */
            --bone: #EFECE7;
            --obsidian: #161311;
            --terracotta: #D95A40; 
            --aubergine: #823055;  
            --gold: #D49A36;       
            --void: #595450;       

            /* Base Light Theme Configurations */
            --bg-canvas: var(--bone);
            --bg-glass: rgba(239, 236, 231, 0.75);
            
            /* 3D Card Gradients (Light) */
            --card-bg-top: rgba(255, 255, 255, 0.95);
            --card-bg-bottom: rgba(245, 242, 238, 0.85);
            
            --text-primary: var(--obsidian);
            --text-secondary: rgba(22, 19, 17, 0.65);
            --text-inverse: #FFFFFF;
            
            --border-subtle: rgba(22, 19, 17, 0.08);
            --card-bevel-light: rgba(255, 255, 255, 1);
            --card-bevel-shadow: rgba(0, 0, 0, 0.04);
            
            --shadow-float: 0 12px 32px rgba(40, 30, 25, 0.08), 0 4px 12px rgba(40, 30, 25, 0.04);
            --shadow-dock: 0 16px 40px rgba(40, 30, 25, 0.12);
            
            /* --- WARM CARD THEME RINGS --- */
            --ring-obsidian-glow: 0 16px 40px rgba(22, 19, 17, 0.15), 0 0 0 4px rgba(22, 19, 17, 0.1);
            --ring-obsidian-border: rgba(22, 19, 17, 0.4);

            --ring-void-glow: 0 16px 40px rgba(89, 84, 80, 0.25), 0 0 0 4px rgba(89, 84, 80, 0.2);
            --ring-void-border: rgba(89, 84, 80, 0.6);

            --ring-terracotta-glow: 0 16px 40px rgba(217, 90, 64, 0.25), 0 0 0 4px rgba(217, 90, 64, 0.2);
            --ring-terracotta-border: rgba(217, 90, 64, 0.6);

            --ring-aubergine-glow: 0 16px 40px rgba(130, 48, 85, 0.25), 0 0 0 4px rgba(130, 48, 85, 0.2);
            --ring-aubergine-border: rgba(130, 48, 85, 0.6);

            --ring-gold-glow: 0 16px 40px rgba(212, 154, 54, 0.25), 0 0 0 4px rgba(212, 154, 54, 0.2);
            --ring-gold-border: rgba(212, 154, 54, 0.6);

            --ring-bone-glow: 0 16px 40px rgba(255, 255, 255, 0.5), 0 0 0 4px rgba(255, 255, 255, 0.6);
            --ring-bone-border: rgba(255, 255, 255, 0.8);

            /* Default Theme Fallback */
            --active-glow: var(--ring-obsidian-glow);
            --active-border: var(--ring-obsidian-border);
            --active-color: var(--obsidian);
            
            /* DYNAMIC CARD FONT SCALAR */
            --card-font-size: 13.5px; 
            
            --space-1: 0.5rem;   
            --space-2: 1rem;     
            --space-3: 1.5rem;   

            --font-ui: 'Figtree', sans-serif;
            --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.15);
            --ease-smooth: cubic-bezier(0.25, 0.1, 0.25, 1);
            --grid-size: 32px;
        }

        /* Fully Compliant High-Contrast Warm Dark Mode */
        html[data-theme="dark"] {
            --bg-canvas: #0D0B0A;
            --bg-glass: rgba(13, 11, 10, 0.85);
            
            /* 3D Card Gradients (Dark) */
            --card-bg-top: rgba(30, 26, 24, 0.95);
            --card-bg-bottom: rgba(20, 17, 15, 0.85);
            
            --text-primary: var(--bone);
            --text-secondary: rgba(239, 236, 231, 0.65);
            --text-inverse: var(--obsidian);
            
            --border-subtle: rgba(239, 236, 231, 0.12);
            --card-bevel-light: rgba(255, 255, 255, 0.1);
            --card-bevel-shadow: rgba(0, 0, 0, 0.8);
            
            --shadow-float: 0 16px 40px rgba(0, 0, 0, 0.8), 0 4px 12px rgba(0, 0, 0, 0.6);
            --shadow-dock: 0 20px 50px rgba(0, 0, 0, 0.95);
        }

        /* ==========================================================================
           RESET & GLOBAL
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            background-color: var(--bg-canvas);
            color: var(--text-primary);
            font-family: var(--font-ui);
            overflow: hidden;
            width: 100dvw;
            height: 100dvh;
            overscroll-behavior: none;
            transition: background-color 0.4s ease;
        }

        /* Scoped typography access */
        .ui-btn, .handle, .color-picker, #ui-dock, .toast, #connections-svg, #modal-layer {
            user-select: none;
            -webkit-user-select: none;
        }

        .card-content {
            user-select: text;
            -webkit-user-select: text;
            cursor: text;
        }

        body.is-panning, body.is-dragging, body.is-resizing {
            user-select: none;
            -webkit-user-select: none;
        }

        /* ==========================================================================
           TOAST NOTIFICATIONS
           ========================================================================== */
        #toast-container {
            position: fixed;
            top: 24px; left: 50%;
            transform: translateX(-50%);
            z-index: 10001;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: linear-gradient(180deg, var(--card-bg-top), var(--card-bg-bottom));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 12px;
            box-shadow: 
                inset 0 1px 1px var(--card-bevel-light),
                inset 0 -1px 2px var(--card-bevel-shadow),
                var(--shadow-float);
            font-weight: 600;
            font-size: 13px;
            border: 1px solid var(--border-subtle);
            animation: toastIn 0.4s var(--ease-spring);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @keyframes toastIn {
            0% { opacity: 0; transform: translateY(-20px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ==========================================================================
           MODAL SYSTEM
           ========================================================================== */
        #modal-layer {
            position: fixed; top: 0; left: 0; width: 100dvw; height: 100dvh;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            z-index: 20000; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #modal-layer.is-active { opacity: 1; pointer-events: auto; }
        .modal-box {
            background: linear-gradient(180deg, var(--card-bg-top), var(--card-bg-bottom));
            border: 1px solid var(--border-subtle); border-radius: 24px; padding: 24px;
            width: 90%; max-width: 440px; box-shadow: var(--shadow-dock);
            display: flex; flex-direction: column; gap: 16px; transform: translateY(20px); transition: transform 0.3s;
        }
        #modal-layer.is-active .modal-box { transform: translateY(0); }
        .modal-title { font-size: 18px; font-weight: 800; color: var(--text-primary); }
        .modal-body { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; flex-wrap: wrap; }


        /* ==========================================================================
           FLOATING DOCK (UNIFIED PROFESSIONAL SAAS LAYOUT)
           ========================================================================== */
        #ui-dock {
            position: fixed;
            bottom: env(safe-area-inset-bottom, var(--space-3));
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-subtle);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 14px; 
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 
                inset 0 -2px 6px rgba(0,0,0,0.02),
                var(--shadow-dock);
            z-index: 10000;
            pointer-events: auto;
            max-width: calc(100dvw - 32px);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        #ui-dock::-webkit-scrollbar {
            display: none;
        }

        html[data-theme="dark"] #ui-dock { border-top: 1px solid rgba(255, 255, 255, 0.08); }

        #ui-dock.is-dragging {
            box-shadow: 0 24px 50px rgba(0,0,0,0.2);
        }

        /* Vertical Rotator Logic */
        #ui-dock.is-vertical {
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
            max-height: calc(100dvh - 32px);
            max-width: max-content;
        }
        
        #ui-dock.is-vertical .dock-divider {
            width: 20px;
            height: 1px;
            margin: 4px 0;
        }
        
        #ui-dock.is-vertical .dock-drag-handle svg {
            transform: rotate(90deg);
        }

        .dock-drag-handle {
            width: 32px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            color: var(--text-secondary);
            flex-shrink: 0;
            border-radius: 8px;
            transition: background 0.2s, color 0.2s;
            touch-action: none;
        }

        .dock-drag-handle:hover {
            background: rgba(128, 128, 128, 0.1);
            color: var(--text-primary);
        }

        .dock-drag-handle:active {
            cursor: grabbing;
        }

        .dock-divider {
            width: 1px;
            height: 20px;
            background: var(--border-subtle);
            margin: 0 4px;
            flex-shrink: 0;
        }

        /* Unified Baseline Button Class */
        .ui-btn {
            height: 36px;
            padding: 0 14px;
            border-radius: 8px;
            font-family: var(--font-ui);
            font-size: 13px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
            border: none;
            cursor: pointer;
            transition: all 0.2s var(--ease-spring);
            background: transparent;
            color: var(--text-secondary);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .ui-btn .icon {
            font-size: 14px;
            font-weight: 800;
        }

        .ui-btn:hover {
            background: rgba(128, 128, 128, 0.1);
            color: var(--text-primary);
        }

        .ui-btn.active {
            background: var(--text-primary);
            color: var(--bg-canvas);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .ui-btn.icon-only {
            padding: 0 10px;
        }

        /* Font Stepper Wrapper */
        .font-stepper {
            display: flex;
            align-items: center;
            background: rgba(128,128,128,0.06);
            border-radius: 8px;
            padding: 2px;
            height: 36px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.04);
            flex-shrink: 0;
        }
        
        .font-stepper .ui-btn {
            background: transparent;
            height: 32px;
            padding: 0 10px;
            box-shadow: none;
        }
        .font-stepper .ui-btn:hover {
            background: var(--bg-canvas);
            color: var(--text-primary);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        /* --- WARM SAAS ACTION BUTTONS --- */
        
        /* Primary: Terracotta (Warm Dopamine) */
        .btn-terracotta {
            background: linear-gradient(180deg, #E26E54, var(--terracotta));
            color: #FFFFFF;
            border: 1px solid rgba(0, 0, 0, 0.1); 
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 12px rgba(217, 90, 64, 0.25);
            text-shadow: 0 1px 2px rgba(0,0,0,0.15);
        }
        .btn-terracotta:hover {
            background: linear-gradient(180deg, #E57D65, #E26E54);
            color: #FFFFFF;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(217, 90, 64, 0.35);
        }
        .btn-terracotta:active {
            transform: translateY(1px);
            background: var(--terracotta);
            border-top: 1px solid transparent;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        /* Secondary/Synthesis: Aubergine (Deep Warm Plum) */
        .btn-aubergine {
            background: linear-gradient(180deg, rgba(148, 62, 102, 0.8), rgba(130, 48, 85, 0.85));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            color: #FFFFFF;
            box-shadow: 0 4px 15px rgba(130, 48, 85, 0.2);
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .btn-aubergine:hover {
            background: linear-gradient(180deg, rgba(160, 75, 115, 0.9), rgba(148, 62, 102, 0.95));
            color: #FFFFFF;
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(130, 48, 85, 0.3);
        }
        .btn-aubergine:active {
            transform: translateY(1px);
            background: rgba(130, 48, 85, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        /* ==========================================================================
           CANVAS LAYOUT & CONNECTIONS
           ========================================================================== */
        #viewport {
            width: 100dvw;
            height: 100dvh;
            cursor: grab;
            position: relative;
            touch-action: none;
        }

        #viewport:active { cursor: grabbing; }

        #grid-pattern {
            position: fixed;
            top: 0; left: 0; width: 100dvw; height: 100dvh;
            pointer-events: none;
            background-image: radial-gradient(var(--border-subtle) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            background-position: 0 0;
            z-index: 0;
        }

        #connections-svg {
            position: fixed;
            top: 0; left: 0;
            width: 100dvw; height: 100dvh;
            pointer-events: none;
            z-index: 1; 
            overflow: visible;
        }

        #connections {
            transform-origin: 0 0;
            will-change: transform;
            transition: transform 0.4s var(--ease-spring);
        }
        #connections.no-transition { transition: none; }

        #world {
            position: fixed;
            top: 0; left: 0;
            width: 0; height: 0;
            transform-origin: 0 0;
            will-change: transform;
            z-index: 2;
            transition: transform 0.4s var(--ease-spring);
        }
        #world.no-transition { transition: none; }
        
        .conn-line {
            stroke: var(--text-secondary);
            stroke-width: 3px;
            stroke-linecap: round;
            fill: none;
            transition: stroke 0.3s var(--ease-smooth);
            pointer-events: none;
        }
        .conn-line.temp {
            stroke: var(--aubergine);
            stroke-dasharray: 6 6;
            animation: dashMove 1s linear infinite;
        }

        .conn-hit {
            stroke: transparent;
            stroke-width: 44px;
            fill: none;
            pointer-events: stroke;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .conn-line.is-hovered, .conn-line.is-active {
            stroke: var(--terracotta) !important;
            stroke-width: 4px;
            filter: drop-shadow(0 0 6px var(--terracotta));
        }

        @keyframes dashMove {
            to { stroke-dashoffset: -12; }
        }

        /* ==========================================================================
           CARD LOGIC: THE PILL RECONSTRUCT & 3D DEPTH
           ========================================================================== */
        #cards {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 3;
        }

        .card {
            position: fixed;
            top: 0; left: 0;
            /* 3D Gradient Base */
            background: linear-gradient(180deg, var(--card-bg-top), var(--card-bg-bottom));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            
            /* Ultimate Pill Geometry */
            border-radius: 48px; 
            padding: 24px 36px; 
            min-width: 160px;
            
            color: var(--text-primary);
            font-size: var(--card-font-size); 
            line-height: 1.5;
            text-align: center; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            /* 3D Physical Bevels & Depth */
            box-shadow: 
                inset 0 1.5px 2px var(--card-bevel-light),
                inset 0 -2px 4px var(--card-bevel-shadow),
                var(--shadow-float);
                
            will-change: transform, width, height;
            transition: opacity 0.4s var(--ease-smooth), box-shadow 0.4s var(--ease-spring), border-color 0.4s;
            cursor: grab;
            touch-action: none;
        }

        body.has-focus .card:not(.is-focused) {
            opacity: 0.4;
            box-shadow: none;
        }

        /* Warm SaaS Card Theming Setup */
        .card.theme-obsidian { --active-glow: var(--ring-obsidian-glow); --active-border: var(--ring-obsidian-border); --active-color: var(--obsidian); }
        .card.theme-void { --active-glow: var(--ring-void-glow); --active-border: var(--ring-void-border); --active-color: var(--void); }
        .card.theme-terracotta { --active-glow: var(--ring-terracotta-glow); --active-border: var(--ring-terracotta-border); --active-color: var(--terracotta); }
        .card.theme-aubergine { --active-glow: var(--ring-aubergine-glow); --active-border: var(--ring-aubergine-border); --active-color: var(--aubergine); }
        .card.theme-gold { --active-glow: var(--ring-gold-glow); --active-border: var(--ring-gold-border); --active-color: var(--gold); }

        .card.is-focused, .card.is-editing {
            border-color: var(--active-border);
            box-shadow: 
                inset 0 1.5px 2px var(--card-bevel-light),
                inset 0 -2px 4px var(--card-bevel-shadow),
                var(--active-glow);
            z-index: 10;
        }

        .card.is-editing { cursor: default; }

        /* ==========================================================================
           AFFORDANCES & CONTROLS (ALIGNED TO PILL GEOMETRY)
           ========================================================================== */
        .card-controls {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s var(--ease-smooth);
            z-index: 20;
        }

        body:not(.is-dragging):not(.is-connecting) .card:hover .card-controls,
        body:not(.is-dragging):not(.is-connecting) .card.is-focused .card-controls {
            opacity: 1;
            pointer-events: auto;
        }

        .card.is-editing .card-controls {
            opacity: 0 !important; 
            pointer-events: none !important;
        }

        body.is-connecting .card-controls {
            opacity: 1 !important;
            pointer-events: auto !important; 
        }
        
        body.is-connecting .color-picker,
        body.is-connecting .handle-resize,
        body.is-connecting .handle-delete {
            opacity: 0 !important;
            pointer-events: none !important;
            display: none !important;
        }
        
        body.is-connecting .handle-connect {
            transform: scale(1.2);
            box-shadow: 0 0 0 3px rgba(128, 128, 128, 0.15);
        }

        .color-picker {
            position: fixed;
            top: -46px; left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(180deg, var(--card-bg-top), var(--card-bg-bottom));
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 6px;
            display: flex;
            gap: 6px;
            box-shadow: 0 4px 12px rgba(40, 30, 25, 0.1);
        }

        .color-swatch {
            width: 18px; height: 18px;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s var(--ease-spring);
            border: 1px solid rgba(0,0,0,0.2);
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.2);
            transform: scale(1);
        }
        .color-swatch:hover { transform: scale(1.15); }
        .swatch-obsidian { background: var(--obsidian); }
        .swatch-void { background: var(--void); }
        .swatch-terracotta { background: var(--terracotta); }
        .swatch-aubergine { background: var(--aubergine); }
        .swatch-gold { background: var(--gold); }

        /* CONNECTORS */
        .handle-connect {
            position: fixed;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: var(--text-inverse);
            border: 3px solid var(--active-color);
            box-shadow: 0 2px 6px rgba(40, 30, 25, 0.15);
            cursor: crosshair;
            transition: transform 0.2s var(--ease-spring), background 0.2s, box-shadow 0.2s;
            z-index: 25;
            transform: scale(1);
        }

        .handle-connect:hover {
            transform: scale(1.4) !important;
            background: var(--active-color);
        }

        .hc-top { top: -7px; left: calc(50% - 7px); }
        .hc-right { right: -7px; top: calc(50% - 7px); }
        .hc-bottom { bottom: -7px; left: calc(50% - 7px); }
        .hc-left { left: -7px; top: calc(50% - 7px); }

        /* Delete Button */
        .handle-delete {
            position: fixed;
            top: -4px; left: 16px; 
            width: 26px; height: 26px;
            background: linear-gradient(180deg, var(--card-bg-top), var(--card-bg-bottom));
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(40, 30, 25, 0.1);
            transition: all 0.2s var(--ease-spring);
            transform: scale(1);
        }
        .handle-delete::before { content: '×'; }
        .handle-delete:hover {
            color: var(--terracotta);
            transform: scale(1.1);
        }

        /* Resize Handle */
        .handle-resize {
            position: fixed;
            bottom: 6px; right: 24px; 
            width: 32px; height: 32px; 
            cursor: se-resize;
            opacity: 0.3;
            transition: opacity 0.2s;
            z-index: 5; 
            transform: scale(1);
        }
        .handle-resize::after {
            content: '';
            position: fixed;
            right: 8px; bottom: 8px;
            width: 10px; height: 10px;
            border-right: 2.5px solid var(--text-secondary);
            border-bottom: 2.5px solid var(--text-secondary);
            border-radius: 2px;
        }
        .handle-resize:hover { opacity: 1; }

        .card-content {
            width: 100%; 
            height: 100%;
            outline: none;
            overflow: hidden;
            word-wrap: break-word;
            pointer-events: none;
            font-weight: 600; 
        }
        .card.is-editing .card-content {
            pointer-events: auto;
            overflow-y: auto;
        }

        .card-content strong { font-weight: 800; color: var(--text-primary); }
        .card-content em { font-style: italic; }

        /* ==========================================================================
           MOBILE THUMB ZONE EXPANSION & RESPONSIVE TWEAKS
           ========================================================================== */
        @media (pointer: coarse) {
            .ui-btn {
                height: 44px;
                min-height: 44px;
            }
            .font-stepper {
                height: 44px;
            }
            .font-stepper .ui-btn {
                height: 40px;
                min-height: 40px;
            }
            .handle-connect::after {
                content: '';
                position: fixed;
                top: 50%; left: 50%;
                width: 44px; height: 44px;
                transform: translate(-50%, -50%);
                border-radius: 50%;
            }
            .handle-delete::after {
                content: '';
                position: fixed;
                top: 50%; left: 50%;
                width: 44px; height: 44px;
                transform: translate(-50%, -50%);
            }
            .handle-resize::before {
                content: '';
                position: fixed;
                right: -10px; bottom: -10px;
                width: 44px; height: 44px;
            }
            .color-swatch::after {
                content: '';
                position: fixed;
                top: 50%; left: 50%;
                width: 32px; height: 32px;
                transform: translate(-50%, -50%);
            }
            .dock-drag-handle {
                width: 44px;
                height: 44px;
            }
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>
    
    <!-- Modal Layer -->
    <div id="modal-layer">
        <div class="modal-box">
            <div class="modal-title" id="modal-title"></div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-actions" id="modal-actions"></div>
        </div>
    </div>

    <div id="ui-dock">
        <div class="dock-drag-handle" title="Drag to move UI">
            <svg width="12" height="16" viewBox="0 0 12 16" fill="currentColor">
                <circle cx="3" cy="2" r="1.5"/>
                <circle cx="9" cy="2" r="1.5"/>
                <circle cx="3" cy="8" r="1.5"/>
                <circle cx="9" cy="8" r="1.5"/>
                <circle cx="3" cy="14" r="1.5"/>
                <circle cx="9" cy="14" r="1.5"/>
            </svg>
        </div>
        
        <button class="ui-btn icon-only" id="btn-rotate" title="Rotate UI"><span class="icon">↻</span></button>

        <div class="dock-divider"></div>

        <button class="ui-btn icon-only" id="btn-recenter" title="Recenter Canvas"><span class="icon">⌖</span></button>
        
        <div class="dock-divider"></div>

        <button class="ui-btn active" id="btn-free"><span class="icon">≢</span> Free</button>
        <button class="ui-btn" id="btn-grid"><span class="icon">▦</span> Grid</button>
        
        <div class="dock-divider"></div>
        
        <div class="font-stepper">
            <button class="ui-btn fs-small" id="btn-font-down">A-</button>
            <button class="ui-btn fs-large" id="btn-font-up">A+</button>
        </div>
        
        <div class="dock-divider"></div>

        <button class="ui-btn" id="btn-theme"><span class="icon">☾</span> Theme</button>
        
        <div class="dock-divider"></div>

        <button class="ui-btn" id="btn-save" title="Save Canvas Locally"><span class="icon">↓</span> Save</button>
        <button class="ui-btn" id="btn-export" title="Export Canvas"><span class="icon">⎘</span> Export</button>
        <button class="ui-btn" id="btn-undo" title="Undo Last Action"><span class="icon">↶</span> Undo</button>
        <button class="ui-btn" id="btn-reset" title="Reset Canvas"><span class="icon">⊘</span> Reset</button>

        <div class="dock-divider"></div>
        
        <button class="ui-btn btn-terracotta" id="btn-add"><span class="icon">+</span> New Card</button>
        <button class="ui-btn btn-aubergine" id="btn-syn"><span class="icon">❖</span> Synthesis</button>
    </div>

    <div id="viewport">
        <div id="grid-pattern"></div>
        
        <svg id="connections-svg" xmlns="http://www.w3.org/2000/svg">
            <g id="connections"></g>
        </svg>

        <div id="world">
            <div id="cards"></div>
        </div>
    </div>

    <script>
        const ENV = {
            viewport: document.getElementById('viewport'),
            world: document.getElementById('world'),
            cardsLayer: document.getElementById('cards'),
            connSvg: document.getElementById('connections-svg'),
            connLayer: document.getElementById('connections'), 
            gridPattern: document.getElementById('grid-pattern'),
            modalLayer: document.getElementById('modal-layer'),
            body: document.body
        };

        const CFG = {
            grid: 32,
            minZoom: 0.15,
            maxZoom: 2.5,
            repulsionForce: 12, 
            defaultCamera: { x: 0, y: 0, zoom: 1 } 
        };

        const STATE = {
            mode: 'free', 
            camera: { x: 0, y: 0, zoom: 1 },
            cards: new Map(),
            connections: [],
            undoStack: [],
            preDragState: null,
            preEditState: null,
            
            focusedCardId: null,
            editingCardId: null,
            
            isPanning: false,
            panStart: { x: 0, y: 0, camX: 0, camY: 0 },
            
            draggingCard: null,
            dragStart: { x: 0, y: 0, cardX: 0, cardY: 0 },
            
            resizingCard: null,
            resizeStart: { x: 0, y: 0, w: 0, h: 0 },
            
            isConnecting: false,
            connStart: { cardId: null, edge: null },
            tempPathEl: null
        };

        let lastCardId = 0;
        let lastConnId = 0;

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-10px) scale(0.9)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        /* --- MODAL ENGINE --- */
        function openModal(title, bodyText, actionsArray) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-body').textContent = bodyText;
            
            const actionsContainer = document.getElementById('modal-actions');
            actionsContainer.innerHTML = '';
            
            actionsArray.forEach(action => {
                const btn = document.createElement('button');
                btn.className = action.class || 'ui-btn';
                btn.textContent = action.text;
                btn.addEventListener('click', action.onClick);
                actionsContainer.appendChild(btn);
            });
            
            ENV.modalLayer.classList.add('is-active');
        }

        function closeModal() {
            ENV.modalLayer.classList.remove('is-active');
        }

        /* --- DATA SERIALIZATION & EXPORT LOGIC --- */
        function serializeCanvas() {
            return JSON.stringify({
                cards: Array.from(STATE.cards.values()).map(c => ({
                    id: c.id, x: c.x, y: c.y, w: c.w, h: c.h, text: c.text,
                    theme: Array.from(c.el.classList).find(cls => cls.startsWith('theme-')) || 'theme-obsidian'
                })),
                connections: STATE.connections.map(c => ({
                    id: c.id, sourceId: c.sourceId, sourceEdge: c.sourceEdge, endId: c.endId, endEdge: c.endEdge
                })),
                camera: STATE.camera
            });
        }

        function generateTXT() {
            let txt = "SPATIAL CANVAS EXPORT\n======================\n\n";
            STATE.cards.forEach(c => {
                const cleanText = c.text.replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]+>/g, '');
                txt += `[CARD: ${c.id}]\n${cleanText}\n\n`;
            });
            txt += "CONNECTIONS\n======================\n";
            STATE.connections.forEach(c => {
                txt += `${c.sourceId} (${c.sourceEdge}) ---> ${c.endId} (${c.endEdge})\n`;
            });
            return txt;
        }

        function generateSynthesisPrompt() {
            return `You are a Senior Logic Strategist. Review the following spatial map data detailing interconnected concepts and their relational ties.

DATA PAYLOAD:
${generateTXT()}
INSTRUCTION:
Sequentially map the flow from root concepts through their connections. Synthesize this data into a comprehensive, professional-grade summary. Maintain absolute relational fidelity. Do not invent features not present in the cards. Format the output in clean Markdown with appropriate headings, lists, and a brief executive synthesis at the beginning.`;
        }

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function copyToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => showToast("Prompt Copied to Clipboard"));
            } else {
                let textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast("Prompt Copied to Clipboard");
                } catch (err) {
                    showToast("Failed to copy. Please download TXT instead.");
                }
                textArea.remove();
            }
        }

        /* --- CORE SYSTEM LOGIC (UNDO, SAVE, LOAD) --- */
        function pushUndoState(specificState = null) {
            const stateToSave = specificState || serializeCanvas();
            STATE.undoStack.push(stateToSave);
            if (STATE.undoStack.length > 50) STATE.undoStack.shift();
        }

        function execUndo() {
            if (STATE.undoStack.length === 0) {
                showToast("Nothing to undo");
                return;
            }
            const prevStateStr = STATE.undoStack.pop();
            restoreCanvasState(prevStateStr);
            showToast("Undo Successful");
        }

        function restoreCanvasState(raw) {
            try {
                const data = JSON.parse(raw);
                
                STATE.cards.forEach(c => c.el.remove());
                STATE.connections.forEach(c => { c.pathEl.remove(); if (c.hitEl) c.hitEl.remove(); });
                STATE.cards.clear();
                STATE.connections = [];
                
                let maxCardId = 0;
                let maxConnId = 0;

                STATE.camera = data.camera || { ...CFG.defaultCamera };
                updateCamera();

                const idMap = new Map();
                data.cards.forEach(cData => {
                    const parsedId = parseInt(cData.id.replace('c_', '')) || 0;
                    if (parsedId > maxCardId) maxCardId = parsedId;

                    const c = createCard(cData.x, cData.y, cData.w, cData.h, cData.text, cData.id);
                    idMap.set(cData.id, c.id);
                    c.el.classList.remove('theme-obsidian', 'theme-void', 'theme-terracotta', 'theme-aubergine', 'theme-gold');
                    if (cData.theme) c.el.classList.add(cData.theme);
                });

                lastCardId = Math.max(lastCardId, maxCardId);

                data.connections.forEach(conn => {
                    const parsedConnId = parseInt(conn.id.replace('c_', '')) || 0;
                    if (parsedConnId > maxConnId) maxConnId = parsedConnId;

                    const newSource = idMap.get(conn.sourceId);
                    const newEnd = idMap.get(conn.endId);
                    if (newSource && newEnd) {
                        createConnection(newSource, conn.sourceEdge, newEnd, conn.endEdge, conn.id);
                    }
                });

                lastConnId = Math.max(lastConnId, maxConnId);

                return true;
            } catch (e) {
                console.error("Restore Failed", e);
                return false;
            }
        }

        function saveCanvas() {
            localStorage.setItem('spatial_canvas_save', serializeCanvas());
            showToast("Canvas Saved Locally");
        }

        function loadCanvas() {
            const raw = localStorage.getItem('spatial_canvas_save');
            if (!raw) return false;
            const success = restoreCanvasState(raw);
            if (success) showToast("Saved Canvas Restored");
            return success;
        }

        function execReset() {
            STATE.cards.forEach(c => c.el.remove());
            STATE.connections.forEach(c => { c.pathEl.remove(); if (c.hitEl) c.hitEl.remove(); });
            STATE.cards.clear();
            STATE.connections = [];
            STATE.camera = { ...CFG.defaultCamera };
            updateCamera();
            localStorage.removeItem('spatial_canvas_save');
            lastCardId = 0;
            lastConnId = 0;
            closeModal();
            showToast("Canvas Cleared");
        }

        function setup() {
            bindGlobalEvents();
            bindUI();
            
            CFG.defaultCamera = { 
                x: window.innerWidth / 2 - 400, 
                y: window.innerHeight / 2 - 200, 
                zoom: 1 
            };
            STATE.camera = { ...CFG.defaultCamera };

            if (!loadCanvas()) {
                const n1 = createCard(120, 140, 260, 120, "<strong>SaaS Pro Design</strong><br>Double-tap to edit. Impeccable pill congruency.");
                n1.el.classList.add('theme-obsidian');
                
                const n2 = createCard(520, 260, 240, 120, "<strong>Fluid Connections</strong><br>Drag from my side-dots. 3D depth secured.");
                n2.el.classList.add('theme-terracotta');
                updateCamera();
            }
        }

        function createCard(x, y, w, h, text, forceId = null) {
            const id = forceId || ('c_' + (++lastCardId));
            const el = document.createElement('div');
            el.className = 'card theme-obsidian'; 
            el.innerHTML = `
                <div class="card-content" tabindex="-1">${text}</div>
                <div class="card-controls">
                    <div class="color-picker">
                        <div class="color-swatch swatch-obsidian" data-theme="theme-obsidian" title="Obsidian"></div>
                        <div class="color-swatch swatch-void" data-theme="theme-void" title="Void"></div>
                        <div class="color-swatch swatch-terracotta" data-theme="theme-terracotta" title="Terracotta"></div>
                        <div class="color-swatch swatch-aubergine" data-theme="theme-aubergine" title="Aubergine"></div>
                        <div class="color-swatch swatch-gold" data-theme="theme-gold" title="Gold"></div>
                    </div>
                    <div class="handle handle-resize"></div>
                    <div class="handle handle-delete"></div>
                    <div class="handle handle-connect hc-top" data-edge="top"></div>
                    <div class="handle handle-connect hc-right" data-edge="right"></div>
                    <div class="handle handle-connect hc-bottom" data-edge="bottom"></div>
                    <div class="handle handle-connect hc-left" data-edge="left"></div>
                </div>
            `;
            
            const cardData = { id, x, y, w, h, text, el, state: 'idle' };
            STATE.cards.set(id, cardData);
            ENV.cardsLayer.appendChild(el);
            
            renderCard(cardData);
            bindCardEvents(cardData);
            
            return cardData;
        }

        function renderCard(n) {
            n.el.style.transform = `translate(${n.x}px, ${n.y}px)`;
            if (n.w !== 'auto') n.el.style.width = `${n.w}px`;
            if (n.h !== 'auto') n.el.style.height = `${n.h}px`;
        }

        function deleteCard(id) {
            const n = STATE.cards.get(id);
            if (!n) return;
            
            STATE.connections = STATE.connections.filter(c => {
                if (c.sourceId === id || c.endId === id) {
                    c.pathEl.remove();
                    if (c.hitEl) c.hitEl.remove();
                    return false;
                }
                return true;
            });
            
            if (STATE.focusedCardId === id) clearFocus();
            
            n.el.style.opacity = '0';
            n.el.style.transform = `translate(${n.x}px, ${n.y}px) scale(0.9)`;
            setTimeout(() => {
                n.el.remove();
                STATE.cards.delete(id);
            }, 300);
        }

        function setFocus(id) {
            if (STATE.focusedCardId === id) return;
            clearFocus();
            
            STATE.focusedCardId = id;
            const n = STATE.cards.get(id);
            if (n) {
                n.state = 'focused';
                n.el.classList.add('is-focused');
                ENV.body.classList.add('has-focus');
            }
        }

        function clearFocus() {
            if (STATE.focusedCardId) {
                const n = STATE.cards.get(STATE.focusedCardId);
                if (n) {
                    n.state = 'idle';
                    n.el.classList.remove('is-focused', 'is-editing');
                    n.el.querySelector('.card-content').removeAttribute('contenteditable');
                }
            }
            STATE.focusedCardId = null;
            STATE.editingCardId = null;
            ENV.body.classList.remove('has-focus');
        }

        function enterEditMode(id) {
            setFocus(id);
            STATE.editingCardId = id;
            const n = STATE.cards.get(id);
            if (n) {
                n.state = 'editing';
                n.el.classList.add('is-editing');
                const content = n.el.querySelector('.card-content');
                content.setAttribute('contenteditable', 'true');
                
                STATE.preEditState = serializeCanvas();
                
                content.focus();

                const blurHandler = () => {
                    if (STATE.preEditState && STATE.preEditState !== serializeCanvas()) {
                        pushUndoState(STATE.preEditState);
                    }
                    STATE.preEditState = null;
                    content.removeEventListener('blur', blurHandler);
                };
                content.addEventListener('blur', blurHandler);
            }
        }

        function updateCamera() {
            const transformMatrix = `translate(${STATE.camera.x}px, ${STATE.camera.y}px) scale(${STATE.camera.zoom})`;
            ENV.world.style.transform = transformMatrix;
            ENV.connLayer.style.transform = transformMatrix;
            
            ENV.gridPattern.style.backgroundPosition = `${STATE.camera.x}px ${STATE.camera.y}px`;
            ENV.gridPattern.style.backgroundSize = `${CFG.grid * STATE.camera.zoom}px ${CFG.grid * STATE.camera.zoom}px`;
        }

        function screenToWorld(clientX, clientY) {
            return {
                x: (clientX - STATE.camera.x) / STATE.camera.zoom,
                y: (clientY - STATE.camera.y) / STATE.camera.zoom
            };
        }

        function getHandleWorldPos(n, edge) {
            let hx = n.x, hy = n.y;
            const w = n.w === 'auto' ? n.el.offsetWidth : n.w;
            const h = n.h === 'auto' ? n.el.offsetHeight : n.h;

            if (edge === 'top') { hx += w / 2; }
            if (edge === 'bottom') { hx += w / 2; hy += h; }
            if (edge === 'left') { hy += h / 2; }
            if (edge === 'right') { hx += w; hy += h / 2; }
            return { x: hx, y: hy, edge };
        }

        function drawBezier(el, p1, p2) {
            const distance = Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
            const curvature = Math.min(distance * 0.5, 150); 

            let cp1x = p1.x, cp1y = p1.y;
            let cp2x = p2.x, cp2y = p2.y;

            if (p1.edge === 'right') cp1x += curvature;
            else if (p1.edge === 'left') cp1x -= curvature;
            else if (p1.edge === 'top') cp1y -= curvature;
            else if (p1.edge === 'bottom') cp1y += curvature;

            if (p2.edge) {
                if (p2.edge === 'right') cp2x += curvature;
                else if (p2.edge === 'left') cp2x -= curvature;
                else if (p2.edge === 'top') cp2y -= curvature;
                else if (p2.edge === 'bottom') cp2y += curvature;
            } else {
                cp2x = p1.edge === 'left' || p1.edge === 'right' ? p2.x : cp2x;
                cp2y = p1.edge === 'top' || p1.edge === 'bottom' ? p2.y : cp2y;
            }

            el.setAttribute('d', `M ${p1.x} ${p1.y} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${p2.x} ${p2.y}`);
        }

        function updateAllConnections() {
            STATE.connections.forEach(c => {
                const sCard = STATE.cards.get(c.sourceId);
                const endCard = STATE.cards.get(c.endId);
                if (sCard && endCard) {
                    const p1 = getHandleWorldPos(sCard, c.sourceEdge);
                    const p2 = getHandleWorldPos(endCard, c.endEdge);
                    drawBezier(c.pathEl, p1, p2);
                    if (c.hitEl) drawBezier(c.hitEl, p1, p2);
                    
                    const sThemeColor = getComputedStyle(sCard.el).getPropertyValue('--active-color').trim();
                    c.pathEl.style.stroke = sThemeColor || 'var(--text-secondary)';
                }
            });
        }

        function createConnection(sId, sEdge, eId, eEdge, forceId = null) {
            if (sId === eId) return;
            const existingIdx = STATE.connections.findIndex(c => 
                (c.sourceId === sId && c.endId === eId) || 
                (c.sourceId === eId && c.endId === sId)
            );
            
            if (existingIdx !== -1) {
                pushUndoState();
                removeConnection(STATE.connections[existingIdx].id);
                showToast("Connection unlinked");
                return;
            }

            const id = forceId || ('c_' + (++lastConnId));

            const pathEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
            pathEl.classList.add('conn-line');
            
            const hitEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
            hitEl.classList.add('conn-hit');

            let lastTap = 0;
            hitEl.addEventListener('pointerup', (e) => {
                const dx = Math.abs(e.clientX - STATE.panStart.x);
                const dy = Math.abs(e.clientY - STATE.panStart.y);
                if (dx > 5 || dy > 5) return; 

                const now = Date.now();
                if (now - lastTap < 300) {
                    pushUndoState();
                    removeConnection(id);
                    showToast("Connection unlinked");
                } else {
                    pathEl.classList.add('is-active');
                    setTimeout(() => pathEl.classList.remove('is-active'), 200);
                }
                lastTap = now;
            });

            hitEl.addEventListener('mouseenter', () => pathEl.classList.add('is-hovered'));
            hitEl.addEventListener('mouseleave', () => pathEl.classList.remove('is-hovered'));

            ENV.connLayer.appendChild(pathEl);
            ENV.connLayer.appendChild(hitEl);
            
            STATE.connections.push({
                id,
                sourceId: sId, sourceEdge: sEdge,
                endId: eId, endEdge: eEdge,
                pathEl, hitEl
            });
            updateAllConnections();
        }

        function removeConnection(id) {
            const idx = STATE.connections.findIndex(c => c.id === id);
            if (idx !== -1) {
                const c = STATE.connections[idx];
                c.pathEl.remove();
                if (c.hitEl) c.hitEl.remove();
                STATE.connections.splice(idx, 1);
            }
        }

        function snapToGrid(val) {
            return Math.round(val / CFG.grid) * CFG.grid;
        }

        function resolveOverlap(activeCard) {
            if (STATE.mode !== 'free') return;
            let resolved = false;
            
            const activeW = activeCard.w === 'auto' ? activeCard.el.offsetWidth : activeCard.w;
            const activeH = activeCard.h === 'auto' ? activeCard.el.offsetHeight : activeCard.h;

            STATE.cards.forEach(n => {
                if (n === activeCard) return;
                
                const nW = n.w === 'auto' ? n.el.offsetWidth : n.w;
                const nH = n.h === 'auto' ? n.el.offsetHeight : n.h;

                const overlap = !(activeCard.x + activeW + 10 <= n.x || activeCard.x >= n.x + nW + 10 ||
                                  activeCard.y + activeH + 10 <= n.y || activeCard.y >= n.y + nH + 10);
                if (overlap) {
                    const dx = (n.x + nW/2) - (activeCard.x + activeW/2);
                    const dy = (n.y + nH/2) - (activeCard.y + activeH/2);
                    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
                    
                    const push = Math.max(CFG.repulsionForce, 30 - dist);
                    n.x += (dx/dist) * push;
                    n.y += (dy/dist) * push;
                    
                    renderCard(n);
                    resolved = true;
                }
            });
            if (resolved) updateAllConnections();
        }

        function bindUI() {
            document.getElementById('btn-recenter').addEventListener('click', () => {
                STATE.camera = { ...CFG.defaultCamera };
                updateCamera();
                showToast("Canvas Centered");
            });

            document.getElementById('btn-theme').addEventListener('click', e => {
                const html = document.documentElement;
                const isDark = html.getAttribute('data-theme') === 'dark';
                html.setAttribute('data-theme', isDark ? 'light' : 'dark');
                const path = e.composedPath();
                const element = path[0] instanceof Element ? path[0] : path[0].parentElement;
                const btn = element.closest('.ui-btn');
                if (btn) btn.innerHTML = isDark ? '<span class="icon">☾</span> Theme' : '<span class="icon">☼</span> Theme';
                showToast(isDark ? "Light Mode Engaged" : "Dark Mode Engaged");
            });

            document.getElementById('btn-free').addEventListener('click', e => {
                STATE.mode = 'free';
                document.getElementById('btn-grid').classList.remove('active');
                const path = e.composedPath();
                const element = path[0] instanceof Element ? path[0] : path[0].parentElement;
                const btn = element.closest('.ui-btn');
                if (btn) btn.classList.add('active');
                showToast("Freeform Mode Engaged");
            });
            
            document.getElementById('btn-grid').addEventListener('click', e => {
                pushUndoState();
                STATE.mode = 'grid';
                document.getElementById('btn-free').classList.remove('active');
                const path = e.composedPath();
                const element = path[0] instanceof Element ? path[0] : path[0].parentElement;
                const btn = element.closest('.ui-btn');
                if (btn) btn.classList.add('active');
                
                STATE.cards.forEach(n => {
                    n.x = snapToGrid(n.x);
                    n.y = snapToGrid(n.y);
                    renderCard(n);
                });
                updateAllConnections();
                showToast("Grid Snapping Active");
            });

            document.getElementById('btn-font-down').addEventListener('click', () => {
                let root = document.documentElement;
                let size = parseFloat(getComputedStyle(root).getPropertyValue('--card-font-size'));
                root.style.setProperty('--card-font-size', Math.max(10, size - 1) + 'px');
            });

            document.getElementById('btn-font-up').addEventListener('click', () => {
                let root = document.documentElement;
                let size = parseFloat(getComputedStyle(root).getPropertyValue('--card-font-size'));
                root.style.setProperty('--card-font-size', Math.min(22, size + 1) + 'px');
            });

            document.getElementById('btn-add').addEventListener('click', () => {
                pushUndoState();
                const center = screenToWorld(window.innerWidth/2, window.innerHeight/2);
                let x = center.x - 100;
                let y = center.y - 50;
                if (STATE.mode === 'grid') { x = snapToGrid(x); y = snapToGrid(y); }
                const n = createCard(x, y, 200, 100, "<strong>New Card</strong><br>Start typing...");
                n.el.classList.add('theme-terracotta');
                setFocus(n.id);
            });

            document.getElementById('btn-save').addEventListener('click', saveCanvas);

            document.getElementById('btn-export').addEventListener('click', () => {
                openModal(
                    "Export Canvas",
                    "Choose a format. Machine-readable JSON preserves spatial data. Human-readable TXT compiles logic. The Prompt Generator builds a copy-paste ready constraint sequence.",
                    [
                        { text: "Cancel", class: "ui-btn", onClick: closeModal },
                        { text: "Download JSON", class: "ui-btn", onClick: () => { downloadFile(serializeCanvas(), 'spatial-canvas.json', 'application/json'); closeModal(); } },
                        { text: "Download TXT", class: "ui-btn", onClick: () => { downloadFile(generateTXT(), 'spatial-canvas.txt', 'text/plain'); closeModal(); } },
                        { text: "Copy AI Prompt", class: "ui-btn btn-aubergine", onClick: () => { copyToClipboard(generateSynthesisPrompt()); closeModal(); } }
                    ]
                );
            });

            document.getElementById('btn-undo').addEventListener('click', execUndo);

            document.getElementById('btn-reset').addEventListener('click', () => {
                openModal(
                    "Confirm RESET CANVAS?",
                    "This will clear all current cards and connections from memory.",
                    [
                        { text: "Cancel", class: "ui-btn", onClick: closeModal },
                        { text: "Save & Reset", class: "ui-btn btn-terracotta", onClick: () => { 
                            saveCanvas(); 
                            pushUndoState();
                            execReset(); 
                        } },
                        { text: "Reset (No Save)", class: "ui-btn", onClick: () => {
                            pushUndoState();
                            execReset();
                        }}
                    ]
                );
            });

            // --- UI ROTATOR LOGIC ---
            document.getElementById('btn-rotate').addEventListener('click', () => {
                const dock = document.getElementById('ui-dock');
                if (!dock.style.top && !dock.style.left) {
                    const preRect = dock.getBoundingClientRect();
                    dock.style.bottom = 'auto';
                    dock.style.transform = 'none';
                    dock.style.left = `${preRect.left}px`;
                    dock.style.top = `${preRect.top}px`;
                }

                dock.classList.toggle('is-vertical');
                
                requestAnimationFrame(() => {
                    const rect = dock.getBoundingClientRect();
                    let newLeft = parseFloat(dock.style.left || 0);
                    let newTop = parseFloat(dock.style.top || 0);
                    
                    newLeft = Math.max(8, Math.min(window.innerWidth - rect.width - 8, newLeft));
                    newTop = Math.max(8, Math.min(window.innerHeight - rect.height - 8, newTop));
                    
                    dock.style.left = `${newLeft}px`;
                    dock.style.top = `${newTop}px`;
                });
                showToast("UI Rotated");
            });

            // --- DOCK DRAG LOGIC ---
            const dock = document.getElementById('ui-dock');
            const dockHandle = dock.querySelector('.dock-drag-handle');
            let isDraggingDock = false;
            let dockStart = { x: 0, y: 0, left: 0, top: 0 };

            dockHandle.addEventListener('pointerdown', e => {
                e.preventDefault();
                e.stopPropagation();
                isDraggingDock = true;
                
                const rect = dock.getBoundingClientRect();
                dock.style.bottom = 'auto';
                dock.style.transform = 'none';
                dock.style.left = `${rect.left}px`;
                dock.style.top = `${rect.top}px`;
                
                dockStart = { x: e.clientX, y: e.clientY, left: rect.left, top: rect.top };
                dock.classList.add('is-dragging');
                dockHandle.setPointerCapture(e.pointerId);
            });

            dockHandle.addEventListener('pointermove', e => {
                if (!isDraggingDock) return;
                e.preventDefault();
                
                const dx = e.clientX - dockStart.x;
                const dy = e.clientY - dockStart.y;
                
                const rect = dock.getBoundingClientRect();
                let newLeft = dockStart.left + dx;
                let newTop = dockStart.top + dy;
                
                newLeft = Math.max(8, Math.min(window.innerWidth - rect.width - 8, newLeft));
                newTop = Math.max(8, Math.min(window.innerHeight - rect.height - 8, newTop));
                
                dock.style.left = `${newLeft}px`;
                dock.style.top = `${newTop}px`;
            });

            dockHandle.addEventListener('pointerup', e => {
                if (isDraggingDock) {
                    isDraggingDock = false;
                    dock.classList.remove('is-dragging');
                    dockHandle.releasePointerCapture(e.pointerId);
                }
            });
            
            // --- SYNTHESIS LOGIC ---
            document.getElementById('btn-syn').addEventListener('click', async () => {
                const btn = document.getElementById('btn-syn');
                let contentText = Array.from(STATE.cards.values())
                                    .map(n => n.text.replace(/<[^>]+>/g, ' ')) 
                                    .join('\n---\n')
                                    .trim();

                if (!contentText) {
                    showToast("Add text to your cards to begin.");
                    return;
                }

                btn.innerHTML = '<span class="icon">❖</span> Processing...';
                btn.style.opacity = '0.7';
                btn.style.pointerEvents = 'none';
                
                try {
                    const apiKey = ""; 
                    
                    if (!apiKey) {
                        showToast("Provide your DeepSeek API key in the code to continue.");
                        throw new Error("Missing Key");
                    }

                    const response = await fetch('https://api.deepseek.com/chat/completions', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify({
                            model: "deepseek-chat",
                            messages: [
                                { 
                                    role: "user", 
                                    content: `Instruction: You are a spatial canvas logic engine. Return a brief, punchy synthesis of the notes without conversational padding.\n\nNotes:\n${contentText}` 
                                }
                            ]
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.error) {
                        throw new Error(data.error.message || "API Error");
                    }

                    const summary = data.choices?.[0]?.message?.content || "Synthesis requires another attempt.";

                    const center = screenToWorld(window.innerWidth/2, window.innerHeight/2);
                    const existingIds = Array.from(STATE.cards.keys());

                    setTimeout(() => {
                        pushUndoState();
                        const aiCard = createCard(center.x - 140, center.y - 80, 280, 'auto', `<strong>Synthesis</strong><br><br>${summary.replace(/\n/g, '<br>')}`);
                        aiCard.el.classList.add('theme-aubergine'); 
                        
                        aiCard.h = aiCard.el.offsetHeight;
                        renderCard(aiCard);
                        setFocus(aiCard.id);
                        resolveOverlap(aiCard);
                        
                        existingIds.forEach(id => {
                            createConnection(id, 'right', aiCard.id, 'left');
                        });

                        showToast("Pipeline Synthesis Finished");
                    }, 50);

                } catch (err) {
                    console.error(err);
                    showToast("Check network connection to run synthesis.");
                } finally {
                    btn.innerHTML = '<span class="icon">❖</span> Synthesis';
                    btn.style.opacity = '1';
                    btn.style.pointerEvents = 'auto';
                }
            });
        }

        function bindCardEvents(n) {
            const swatches = n.el.querySelectorAll('.color-swatch');
            swatches.forEach(swatch => {
                swatch.addEventListener('pointerdown', e => {
                    e.stopPropagation(); 
                    pushUndoState();
                    n.el.classList.remove('theme-obsidian', 'theme-void', 'theme-terracotta', 'theme-aubergine', 'theme-gold');
                    n.el.classList.add(swatch.dataset.theme);
                    updateAllConnections(); 
                });
            });

            n.el.addEventListener('pointerdown', e => {
                const path = e.composedPath();
                const element = path[0] instanceof Element ? path[0] : path[0].parentElement;
                if (element.closest('.handle') || element.closest('.color-picker') || STATE.isConnecting) return;
                
                if (STATE.editingCardId !== n.id) {
                    e.preventDefault(); 
                    setFocus(n.id);
                    STATE.preDragState = serializeCanvas();
                    STATE.draggingCard = n;
                    STATE.dragStart = { x: e.clientX, y: e.clientY, cardX: n.x, cardY: n.y };
                    ENV.body.classList.add('is-dragging');
                    n.el.style.cursor = 'grabbing';
                    n.el.setPointerCapture(e.pointerId);
                }
            });

            n.el.addEventListener('dblclick', e => {
                const path = e.composedPath();
                const element = path[0] instanceof Element ? path[0] : path[0].parentElement;
                if (element.closest('.handle') || element.closest('.color-picker')) return;
                enterEditMode(n.id);
            });

            const resizeHandle = n.el.querySelector('.handle-resize');
            resizeHandle.addEventListener('pointerdown', e => {
                e.stopPropagation();
                e.preventDefault();
                setFocus(n.id);
                STATE.preDragState = serializeCanvas();
                STATE.resizingCard = n;
                STATE.resizeStart = { x: e.clientX, y: e.clientY, w: n.w, h: n.h };
                ENV.body.classList.add('is-resizing');
                resizeHandle.setPointerCapture(e.pointerId);
            });

            const delHandle = n.el.querySelector('.handle-delete');
            delHandle.addEventListener('pointerdown', e => {
                e.stopPropagation();
                openModal(
                    "Confirm Delete",
                    "Are you sure you want to permanently delete this card? Connected links will also be removed.",
                    [
                        { text: "Cancel", class: "ui-btn", onClick: closeModal },
                        { text: "Delete", class: "ui-btn btn-terracotta", onClick: () => {
                            pushUndoState();
                            deleteCard(n.id);
                            closeModal();
                        }}
                    ]
                );
            });

            const connHandles = n.el.querySelectorAll('.handle-connect');
            connHandles.forEach(handle => {
                handle.addEventListener('pointerdown', e => {
                    e.stopPropagation();
                    e.preventDefault();
                    STATE.isConnecting = true;
                    STATE.connStart = { cardId: n.id, edge: handle.dataset.edge };
                    
                    STATE.tempPathEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    STATE.tempPathEl.classList.add('conn-line', 'temp');
                    
                    const sThemeColor = getComputedStyle(n.el).getPropertyValue('--active-color').trim();
                    STATE.tempPathEl.style.stroke = sThemeColor || 'var(--aubergine)';
                    
                    ENV.connLayer.appendChild(STATE.tempPathEl);
                    ENV.body.classList.add('is-connecting');
                    handle.setPointerCapture(e.pointerId);
                });
            });
        }

        function cancelConnection() {
            STATE.isConnecting = false;
            STATE.connStart = { cardId: null, edge: null };
            if (STATE.tempPathEl) {
                STATE.tempPathEl.remove();
                STATE.tempPathEl = null;
            }
            ENV.body.classList.remove('is-connecting');
        }

        function bindGlobalEvents() {
            ENV.viewport.addEventListener('pointerdown', e => {
                const path = e.composedPath();
                const element = path[0] instanceof Element ? path[0] : path[0].parentElement;
                if (element === ENV.viewport || element === ENV.gridPattern || element === ENV.connSvg || (element.classList && element.classList.contains('conn-hit'))) {
                    clearFocus();
                    STATE.isPanning = true;
                    STATE.panStart = { x: e.clientX, y: e.clientY, camX: STATE.camera.x, camY: STATE.camera.y };
                    ENV.world.classList.add('no-transition');
                    ENV.connLayer.classList.add('no-transition');
                    ENV.viewport.setPointerCapture(e.pointerId);
                }
            });

            ENV.viewport.addEventListener('wheel', e => {
                if (e.ctrlKey) e.preventDefault();
                
                ENV.world.classList.add('no-transition');
                ENV.connLayer.classList.add('no-transition');
                
                const zoomDelta = Math.sign(e.deltaY) * -0.05;
                const newZoom = Math.max(CFG.minZoom, Math.min(STATE.camera.zoom + zoomDelta, CFG.maxZoom));
                
                const wx = (e.clientX - STATE.camera.x) / STATE.camera.zoom;
                const wy = (e.clientY - STATE.camera.y) / STATE.camera.zoom;
                
                STATE.camera.zoom = newZoom;
                STATE.camera.x = e.clientX - wx * STATE.camera.zoom;
                STATE.camera.y = e.clientY - wy * STATE.camera.zoom;
                
                updateCamera();
                
                clearTimeout(ENV.wheelTimeout);
                ENV.wheelTimeout = setTimeout(() => {
                    ENV.world.classList.remove('no-transition');
                    ENV.connLayer.classList.remove('no-transition');
                }, 100);
            }, { passive: false });

            window.addEventListener('pointermove', e => {
                if (STATE.isPanning) {
                    STATE.camera.x = STATE.panStart.camX + (e.clientX - STATE.panStart.x);
                    STATE.camera.y = STATE.panStart.camY + (e.clientY - STATE.panStart.y);
                    updateCamera();
                    return;
                }
                
                if (STATE.draggingCard) {
                    const n = STATE.draggingCard;
                    const dx = (e.clientX - STATE.dragStart.x) / STATE.camera.zoom;
                    const dy = (e.clientY - STATE.dragStart.y) / STATE.camera.zoom;
                    
                    let newX = STATE.dragStart.cardX + dx;
                    let newY = STATE.dragStart.cardY + dy;

                    if (STATE.mode === 'grid') {
                        newX = snapToGrid(newX);
                        newY = snapToGrid(newY);
                    }

                    n.x = newX;
                    n.y = newY;
                    
                    renderCard(n);
                    updateAllConnections();
                    resolveOverlap(n);
                    return;
                }

                if (STATE.resizingCard) {
                    const n = STATE.resizingCard;
                    const dx = (e.clientX - STATE.resizeStart.x) / STATE.camera.zoom;
                    const dy = (e.clientY - STATE.resizeStart.y) / STATE.camera.zoom;
                    
                    let newW = Math.max(160, STATE.resizeStart.w + dx); 
                    let newH = Math.max(80, STATE.resizeStart.h + dy);  
                    
                    if (STATE.mode === 'grid') {
                        newW = snapToGrid(newW);
                        newH = snapToGrid(newH);
                    }

                    n.w = newW;
                    n.h = newH;
                    
                    renderCard(n);
                    updateAllConnections();
                    return;
                }

                if (STATE.isConnecting && STATE.tempPathEl) {
                    const sCard = STATE.cards.get(STATE.connStart.cardId);
                    const p1 = getHandleWorldPos(sCard, STATE.connStart.edge);
                    const p2 = screenToWorld(e.clientX, e.clientY);
                    drawBezier(STATE.tempPathEl, p1, p2);
                }
            });

            window.addEventListener('pointerup', (e) => {
                STATE.isPanning = false;
                ENV.world.classList.remove('no-transition');
                ENV.connLayer.classList.remove('no-transition');
                
                if (STATE.draggingCard) {
                    STATE.draggingCard.el.style.cursor = 'grab';
                    STATE.draggingCard = null;
                    ENV.body.classList.remove('is-dragging');
                    
                    if (STATE.preDragState && STATE.preDragState !== serializeCanvas()) {
                        pushUndoState(STATE.preDragState);
                    }
                    STATE.preDragState = null;
                }
                
                if (STATE.resizingCard) {
                    STATE.resizingCard = null;
                    ENV.body.classList.remove('is-resizing');

                    if (STATE.preDragState && STATE.preDragState !== serializeCanvas()) {
                        pushUndoState(STATE.preDragState);
                    }
                    STATE.preDragState = null;
                }

                if (STATE.isConnecting) {
                    const dropPt = screenToWorld(e.clientX, e.clientY);
                    let closestCard = null;
                    let closestEdge = null;
                    let closestDist = Infinity;

                    STATE.cards.forEach(endCard => {
                        if (endCard.id === STATE.connStart.cardId) return; 
                        
                        ['top', 'right', 'bottom', 'left'].forEach(edge => {
                            const hp = getHandleWorldPos(endCard, edge);
                            const dist = Math.hypot(hp.x - dropPt.x, hp.y - dropPt.y);
                            if (dist < 120 && dist < closestDist) { 
                                closestDist = dist;
                                closestCard = endCard;
                                closestEdge = edge;
                            }
                        });
                    });

                    if (closestCard) {
                        pushUndoState();
                        createConnection(STATE.connStart.cardId, STATE.connStart.edge, closestCard.id, closestEdge);
                    }

                    cancelConnection();
                }
            });
            
            ENV.cardsLayer.addEventListener('input', e => {
                const path = e.composedPath();
                const element = path[0] instanceof Element ? path[0] : path[0].parentElement;
                if (element.classList.contains('card-content')) {
                    const cardEl = element.closest('.card');
                    const n = Array.from(STATE.cards.values()).find(nd => nd.el === cardEl);
                    
                    let html = element.innerHTML;
                    
                    if (/\*\*(.+?)\*\*/.test(html) || /\*(.+?)\*/.test(html)) {
                        const sel = window.getSelection();
                        let caretOffset = 0;
                        
                        if (sel.rangeCount > 0) {
                            const range = sel.getRangeAt(0);
                            const preCaretRange = range.cloneRange();
                            preCaretRange.selectNodeContents(element);
                            preCaretRange.setEnd(range.endContainer, range.endOffset);
                            caretOffset = preCaretRange.toString().length;
                        }

                        let originalTextLength = element.textContent.length;

                        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                        html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

                        if (element.innerHTML !== html) {
                            element.innerHTML = html;
                            
                            let newTextLength = element.textContent.length;
                            let diff = originalTextLength - newTextLength;
                            caretOffset -= diff;
                            if (caretOffset < 0) caretOffset = 0;

                            let charIndex = 0;
                            let range = document.createRange();
                            range.setStart(element, 0);
                            range.collapse(true);
                            let nodeStack = [element], node, foundStart = false;

                            while (!foundStart && (node = nodeStack.pop())) {
                                if (node.nodeType === 3) {
                                    const nextCharIndex = charIndex + node.length;
                                    if (caretOffset >= charIndex && caretOffset <= nextCharIndex) {
                                        range.setStart(node, caretOffset - charIndex);
                                        range.collapse(true);
                                        foundStart = true;
                                    }
                                    charIndex = nextCharIndex;
                                } else {
                                    let i = node.childNodes.length;
                                    while (i--) nodeStack.push(node.childNodes[i]);
                                }
                            }
                            
                            if (!foundStart && element.childNodes.length > 0) {
                                range.selectNodeContents(element);
                                range.collapse(false);
                            }

                            sel.removeAllRanges();
                            sel.addRange(range);
                        }
                    }
                    if (n) n.text = element.innerHTML;
                }
            });
        }

        setup();
    </script>
</body>
